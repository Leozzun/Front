<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      h2 {
        text-align: center;
      }
      table {
        width: 500px;
        height: 100px;
        border: 2px solid red;
        margin: auto;
      }

      tr,
      td {
        border: 1px solid black;
        text-align: center;
        color: black;
      }

      #title {
        color: black;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <h2>성적표-1</h2>
    <table>
      <tr>
        <td>이름</td>
        <td>국어</td>
        <td>영어</td>
        <td>수학</td>
        <td>총점</td>
        <td>평균</td>
        <td>등급</td>
      </tr>
      <tr>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
      </tr>
    </table>
    <script>
      let name = prompt("이름");
      let kor = Number(prompt("국어 점수"));
      let eng = Number(prompt("영어 점수"));
      let math = Number(prompt("수학 점수"));

      let sum = kor + eng + math;
      let avg = sum / 3;
      let a = parseInt(avg) / 10;

      switch (a) {
        case 10:
          grade = "A";
          break;
        case 9:
          grade = "A";
          break;
        case 8:
          grade = "B";
          break;
        case 7:
          grade = "C";
          break;
        case 6:
          grade = "D";
          break;
        default:
          grade = "F";
      }

      document.querySelectorAll("tr")[1].innerHTML =
        `<td>${name}</td><td>${kor}</td><td>${eng}</td>
      <td>${math}</td><td>${sum}</td><td>${avg}</td><td>${grade}</td>`;
    </script>
  </body>
</html>
