<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      //여기는 자바스크립 영역입니댜.

      /*여러 줄 또는부분 주석입니다.*/

      //콘솔에 출력
      console.log("어디에 출력되나요?");

      //브라우저에 출력
      document.write("<h1>난 어디에 나오나요?</h1>");

      //함수 작성
      function test() {
        window.alert("되나?"); // 메시지 창
        //h2에 css 적용

        //elementf를 찾는 방법
        document.getElementById("h2").style.backgroundColor = "red";
        document.getElementById("h2").style.color = "white";
      }

      //h3 태그에 css 적용 - 문서가 열릴때!!
      document.getElementById("h3").style.border = "3px red solid";
    </script>
  </head>
  <body>
    <!-- 태그의 속성으로 이벤트 등록 -->
    <h2 onclick="test(this)" id="h2">JavaScript 시작하기</h2>
    <h2 onclick="test(this)">졸립다~</h2>
    <h3 id="h3">오늘은 수요일</h3>
  </body>
</html>
