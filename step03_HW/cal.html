<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      div {
        width: 200px;
        height: 100px;
        border: 1px red solid;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <h2>계산해보자</h2>
    <button>계산</button>
    <div id="result"></div>
    <script>
      document.querySelector("button").addEventListener("click", function () {
        let output = cal();
        document.querySelector("#result").innerHTML += `<h5>${output}</h5>`;
      });

      const cal = function () {
        let num1 = Number(prompt("숫자1"));
        let num2 = Number(prompt("숫자2"));

        if (isNaN(num1) || isNaN(num2) == true) {
          let con = confirm("다시할래?");
          if (con == true) {
            return cal();
          } else {
            stop;
          }
        }

        let a = prompt("연산기호");
        let result;

        if (a == "+") {
          result = num1 + num2;
        } else if (a == "-") {
          result = num1 - num2;
        } else if (a == "*") {
          result = num1 * num2;
        } else if (a == "/") {
          result = num1 / num2;
        } else {
          let con = confirm("다시할래?");
          if (con == true) {
            return cal();
          } else {
            stop;
          }
        }
        return `${num1} ${a} ${num2} = ${result}`;
      };
    </script>
  </body>
</html>
